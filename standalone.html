<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>libcimbar — 彩色条码文件传输</title>
<style>
/* style.css — Modern dark theme for libcimbar HTML project */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --green: #3fb950;
  --red: #f85149;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  width: 100%;
  max-width: 900px;
  padding: 24px 20px 0;
  text-align: center;
}
header h1 {
  font-size: 1.8rem;
  color: var(--accent);
  letter-spacing: -0.5px;
}
header p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 0.9rem;
}

/* Tabs */
nav.tabs {
  display: flex;
  gap: 0;
  margin-top: 20px;
  border-bottom: 2px solid var(--border);
  width: 100%;
  max-width: 900px;
  padding: 0 20px;
}
nav.tabs button {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1rem;
  padding: 10px 24px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: color .15s, border-color .15s;
  font-family: var(--font);
}
nav.tabs button:hover { color: var(--text); }
nav.tabs button.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* Panels */
main {
  width: 100%;
  max-width: 900px;
  padding: 20px;
  flex: 1;
}
.panel { display: none; }
.panel.active { display: block; }

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
}

/* Encode */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  margin-bottom: 16px;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(88, 166, 255, 0.05);
}
.drop-zone .icon { font-size: 2rem; margin-bottom: 8px; }
.drop-zone p { color: var(--text-muted); font-size: 0.9rem; }
.drop-zone .browse { color: var(--accent); text-decoration: underline; }

.canvas-wrap {
  background: #000;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  margin-bottom: 16px;
  min-height: 300px;
}
#encode-canvas {
  max-width: 100%;
  height: auto;
  image-rendering: pixelated;
}

.controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.controls button {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 0.9rem;
  transition: background .15s;
  font-family: var(--font);
}
.controls button:hover { background: var(--border); }
.controls button.primary {
  background: #238636;
  border-color: #238636;
  color: #fff;
}
.controls button.primary:hover { background: #2ea043; }
.controls button.danger { background: #da3633; border-color: #da3633; color: #fff; }
.controls button.danger:hover { background: #f85149; }

.controls label {
  color: var(--text-muted);
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 4px;
}
.controls select, .controls input[type=range] {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 0.85rem;
}

.status-bar {
  font-size: 0.85rem;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Decode */
.video-wrap {
  position: relative;
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  aspect-ratio: 4 / 3;
  max-height: 450px;
}
#decode-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
#decode-preview {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* Footer */
footer {
  padding: 16px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.8rem;
}

/* Responsive */
@media (max-width: 600px) {
  header h1 { font-size: 1.3rem; }
  .controls { flex-direction: column; align-items: stretch; }
  .controls button { width: 100%; }
}

/* Frame progress chips */
.frame-progress {
  flex-wrap: wrap;
  gap: 3px;
  margin-bottom: 12px;
  justify-content: center;
}
.fc {
  width: 14px; height: 14px;
  border-radius: 3px;
  display: inline-block;
  transition: background .2s;
}
.fc.pend { background: #30363d; border: 1px solid #484f58; }
.fc.rcvd { background: #3fb950; border: 1px solid #2ea043; }

</style>
</head>
<body data-tab="encode">

<header>
  <h1>libcimbar</h1>
  <p>基于彩色矩阵条码的文件传输 — 选择文件生成动画条码，手机扫码即可接收</p>
  <nav class="tabs">
    <button id="tab-encode" class="active">📤 编码 / 发送</button>
    <button id="tab-decode">📥 解码 / 接收</button>
  </nav>
</header>

<main>

  <!-- ====== Encode Panel ====== -->
  <section class="panel active" id="panel-encode">
    <div class="card">
      <div class="drop-zone" id="drop-zone">
        <div class="icon">📁</div>
        <p>拖拽文件到此处，或 <span class="browse">点击浏览</span></p>
        <input type="file" id="file-input" hidden>
      </div>

      <div class="canvas-wrap">
        <canvas id="encode-canvas" width="600" height="600"></canvas>
      </div>

      <div class="controls">
        <button id="btn-play" class="primary">▶ 播放</button>
        <button id="btn-pause">⏸ 暂停</button>
        <button id="btn-stop" class="danger">⏹ 停止</button>
        <label>速度 <input type="range" id="speed-slider" min="100" max="1000" value="300" step="50"></label>
        <span id="speed-label">300ms</span>
        <label>网格
          <select id="grid-select">
            <option value="24">24×24</option>
            <option value="30" selected>30×30</option>
            <option value="36">36×36</option>
            <option value="42">42×42</option>
            <option value="48">48×48</option>
          </select>
        </label>
        <label>颜色
          <select id="color-select">
            <option value="4" selected>4色</option>
            <option value="8">8色</option>
          </select>
        </label>
      </div>

      <div class="status-bar">
        <span id="encode-status">选择文件以开始</span>
        <span id="encode-progress"></span>
      </div>
    </div>
  </section>

  <!-- ====== Decode Panel ====== -->
  <section class="panel" id="panel-decode">
    <div class="card">
      <div class="video-wrap">
        <video id="decode-video" playsinline autoplay muted></video>
        <canvas id="decode-preview" width="640" height="480"></canvas>
      </div>

      <div id="frame-progress" class="frame-progress"></div>

      <div class="controls">
        <button id="btn-start-cam" class="primary">📷 打开摄像头</button>
        <button id="btn-stop-cam">⏹ 关闭</button>
        <button id="btn-scan">🔍 开始扫描</button>
        <button id="btn-pause-scan">⏸ 暂停扫描</button>
        <label>摄像头
          <select id="camera-select">
            <option value="environment">后置</option>
            <option value="user">前置</option>
          </select>
        </label>
      </div>

      <div class="status-bar">
        <span id="decode-status">就绪 — 网格和颜色数自动识别</span>
        <span id="decode-progress"></span>
      </div>
    </div>
  </section>

</main>

<footer>
  <span>libcimbar — Color Icon Matrix Barcode · 基于 <a href="https://github.com/sz3/libcimbar" style="color:var(--accent)">sz3/libcimbar</a> 概念实现</span>
</footer>

<script>
/**
 * libcimbar.js — Core encoding/decoding engine for color barcode file transfer
 */
const Cimbar = (() => {
  'use strict';

  const MAGIC = 0xb4;
  const VERSION = 0x01;

  const MARKER_COLOR = [0, 140, 140];
  const DATA_COLORS_4 = [
    [30, 30, 30], [220, 50, 50], [50, 180, 50], [50, 100, 220],
  ];
  const DATA_COLORS_8 = [
    [30, 30, 30], [220, 50, 50], [50, 180, 50], [50, 100, 220],
    [220, 200, 30], [200, 50, 180], [30, 200, 200], [220, 220, 220],
  ];
  const CORNER_MARKER = [255, 255, 255];
  const BORDER_CELLS = 2;
  const DEFAULT_GRID = 30;
  const DEFAULT_COLORS = 4;
  const TRIAL_GRIDS = [24, 30, 36, 42, 48];
  const TRIAL_COLORS = [8, 4];

  function dataCellsPerSide(g) { return g - 2 * BORDER_CELLS; }
  function totalDataCells(g) { return dataCellsPerSide(g) ** 2; }
  function bytesPerFrame(g, bpc) { return Math.floor((totalDataCells(g) * bpc) / 8); }
  function paletteFor(colors) { return colors === 8 ? DATA_COLORS_8 : DATA_COLORS_4; }
  function bitsPerCellFor(colors) { return colors === 8 ? 3 : 2; }

  function crc16(data) {
    let crc = 0xffff;
    for (let i = 0; i < data.length; i++) {
      crc ^= data[i] & 0xff;
      for (let j = 0; j < 8; j++) {
        if (crc & 1) crc = (crc >>> 1) ^ 0xa001;
        else crc >>>= 1;
      }
    }
    return crc & 0xffff;
  }

  function bytesToBits(bytes) {
    const bits = [];
    for (const b of bytes)
      for (let i = 7; i >= 0; i--) bits.push((b >> i) & 1);
    return bits;
  }

  function bitsToBytes(bits) {
    const bytes = [];
    for (let i = 0; i + 7 < bits.length; i += 8) {
      let b = 0;
      for (let j = 0; j < 8; j++) b = (b << 1) | (bits[i + j] & 1);
      bytes.push(b);
    }
    return new Uint8Array(bytes);
  }

  function createEmptyGrid(n) {
    const g = new Array(n);
    for (let i = 0; i < n; i++) g[i] = new Array(n).fill(0);
    return g;
  }

  function encodeGrid(frameBytes, gridSize, bitsPerCell) {
    const grid = createEmptyGrid(gridSize);
    const dataSide = dataCellsPerSide(gridSize);
    const bits = bytesToBits(frameBytes);
    const maxBits = totalDataCells(gridSize) * bitsPerCell;

    for (let r = 0; r < gridSize; r++) {
      for (let c = 0; c < gridSize; c++) {
        const isBorder = r < BORDER_CELLS || r >= gridSize - BORDER_CELLS ||
                         c < BORDER_CELLS || c >= gridSize - BORDER_CELLS;
        if (isBorder) {
          grid[r][c] = -1;
        } else {
          const cellIdx = (r - BORDER_CELLS) * dataSide + (c - BORDER_CELLS);
          const base = cellIdx * bitsPerCell;
          if (base + bitsPerCell - 1 < maxBits) {
            let v = 0;
            for (let b = 0; b < bitsPerCell; b++) {
              const bit = (base + b < bits.length) ? (bits[base + b] & 1) : 0;
              v = (v << 1) | bit;
            }
            grid[r][c] = v;
          } else {
            grid[r][c] = 0;
          }
        }
      }
    }

    for (let r = 0; r < 2; r++)
      for (let c = 0; c < 2; c++) grid[r][c] = -2;
    for (let r = 0; r < 2; r++)
      for (let c = gridSize - 2; c < gridSize; c++) grid[r][c] = -2;
    for (let r = gridSize - 2; r < gridSize; r++)
      for (let c = 0; c < 2; c++) grid[r][c] = -2;

    return grid;
  }

  function getCellColor(v, palette) {
    if (v === -1) return MARKER_COLOR;
    if (v === -2) return CORNER_MARKER;
    if (!palette) palette = DATA_COLORS_8;
    return palette[v] || palette[0];
  }

  function renderGrid(ctx, grid, canvasSize, palette) {
    palette = palette || DATA_COLORS_8;
    const gs = grid.length, cs = canvasSize / gs;
    ctx.clearRect(0, 0, canvasSize, canvasSize);
    for (let r = 0; r < gs; r++) {
      for (let c = 0; c < gs; c++) {
        const [cr, cg, cb] = getCellColor(grid[r][c], palette);
        ctx.fillStyle = 'rgb(' + cr + ',' + cg + ',' + cb + ')';
        ctx.fillRect(Math.floor(c * cs), Math.floor(r * cs), Math.ceil(cs), Math.ceil(cs));
      }
    }
  }

  function encodeFile(fileBuffer, fileName, gridSize, colorCount) {
    gridSize = gridSize || DEFAULT_GRID;
    colorCount = colorCount || DEFAULT_COLORS;
    const bitsPerCell = bitsPerCellFor(colorCount);
    const frameCapacity = bytesPerFrame(gridSize, bitsPerCell);
    const overhead = 10;
    const maxPayload = frameCapacity - overhead;
    if (maxPayload < 1) throw new Error('Grid too small');

    const fnameBytes = new TextEncoder().encode(fileName);
    const f0Data = maxPayload - 1 - fnameBytes.length;
    if (f0Data < 0) throw new Error('Filename too long');

    const remaining = fileBuffer.length - f0Data;
    const otherFrames = remaining > 0 ? Math.ceil(remaining / maxPayload) : 0;
    const totalFrames = 1 + otherFrames;
    const grids = [];

    for (let fi = 0; fi < totalFrames; fi++) {
      let payload;
      const flags = (fi === 0 ? 1 : 0) | (colorCount === 8 ? 2 : 0);

      if (fi === 0) {
        const dLen = Math.min(f0Data, fileBuffer.length);
        payload = new Uint8Array(1 + fnameBytes.length + dLen);
        payload[0] = fnameBytes.length;
        payload.set(fnameBytes, 1);
        payload.set(fileBuffer.subarray(0, dLen), 1 + fnameBytes.length);
      } else {
        const start = f0Data + (fi - 1) * maxPayload;
        const end = Math.min(start + maxPayload, fileBuffer.length);
        payload = fileBuffer.subarray(start, end);
      }

      const fb = new Uint8Array(8 + payload.length + 2);
      fb[0] = MAGIC; fb[1] = VERSION; fb[2] = fi; fb[3] = totalFrames;
      fb[4] = (payload.length >> 8) & 0xff; fb[5] = payload.length & 0xff;
      fb[6] = flags;
      fb[7] = gridSize;
      fb.set(payload, 8);
      const crc = crc16(fb.subarray(0, 8 + payload.length));
      fb[8 + payload.length] = (crc >> 8) & 0xff;
      fb[8 + payload.length + 1] = crc & 0xff;
      grids.push(encodeGrid(fb, gridSize, bitsPerCell));
    }

    return { grids, totalFrames, fileName, gridSize, colorCount, palette: paletteFor(colorCount) };
  }

  function isMarkerColor(r, g, b) {
    if (g < 40 || b < 40 || r > g + 30 || r > b + 30) return false;
    const dg = g / 255, db = b / 255;
    return Math.abs(dg - db) < 0.4;
  }

  // Sample a small patch around (x,y) and return average RGB
  function samplePatch(pixels, imgWidth, imgHeight, x, y, radius) {
    let sr = 0, sg = 0, sb = 0, count = 0;
    radius = radius || 1;
    for (let dy = -radius; dy <= radius; dy++) {
      for (let dx = -radius; dx <= radius; dx++) {
        const sx = Math.round(x + dx), sy = Math.round(y + dy);
        if (sx >= 0 && sx < imgWidth && sy >= 0 && sy < imgHeight) {
          const idx = (sy * imgWidth + sx) * 4;
          sr += pixels[idx]; sg += pixels[idx + 1]; sb += pixels[idx + 2];
          count++;
        }
      }
    }
    return { r: Math.round(sr / count), g: Math.round(sg / count), b: Math.round(sb / count) };
  }

  // Ratio-based classification: works under varying lighting
  function classifyCellColorRatio(r, g, b, palette) {
    const total = r + g + b || 1;
    const rr = r / total, gg = g / total, bb = b / total;
    const maxC = Math.max(r, g, b);
    const minC = Math.min(r, g, b);

    if (maxC < 50) return 0; // black
    if (minC > 180 && maxC - minC < 40) return palette.length > 4 ? 7 : 0; // white or fallback

    if (palette.length <= 4) {
      // 4-color mode: use simple channel dominance
      if (rr > 0.35 && gg < 0.32 && bb < 0.32) return 1; // red
      if (gg > 0.35 && rr < 0.32 && bb < 0.32) return 2; // green
      if (bb > 0.35 && rr < 0.32 && gg < 0.32) return 3; // blue
      // fallback: nearest neighbor
    } else {
      // 8-color mode
      if (rr > 0.42 && gg < 0.25 && bb < 0.25) return 1; // red
      if (gg > 0.42 && rr < 0.25 && bb < 0.25) return 2; // green
      if (bb > 0.42 && rr < 0.25 && gg < 0.25) return 3; // blue
      if (rr > 0.3 && gg > 0.3 && bb < 0.2 && rr < 0.45 && gg < 0.45) return 4; // yellow
      if (rr > 0.3 && bb > 0.3 && gg < 0.2 && rr < 0.45 && bb < 0.45) return 5; // magenta
      if (gg > 0.3 && bb > 0.3 && rr < 0.2 && gg < 0.45 && bb < 0.45) return 6; // cyan
      if (minC > 160 && maxC - minC < 50) return 7; // white
    }

    // Euclidean fallback
    let best = 0, bestDist = Infinity;
    for (let i = 0; i < palette.length; i++) {
      const [cr, cg, cb] = palette[i];
      const d = (r - cr) ** 2 + (g - cg) ** 2 + (b - cb) ** 2;
      if (d < bestDist) { bestDist = d; best = i; }
    }
    return best;
  }

  function findGridCorners(imageData, width, height) {
    const pixels = imageData.data;
    const pts = [];
    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const i = (y * width + x) * 4;
        if (isMarkerColor(pixels[i], pixels[i + 1], pixels[i + 2]))
          pts.push({ x, y });
      }
    }
    if (pts.length < 20) return null;

    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of pts) {
      if (p.x < minX) minX = p.x; if (p.y < minY) minY = p.y;
      if (p.x > maxX) maxX = p.x; if (p.y > maxY) maxY = p.y;
    }

    const bw = maxX - minX, bh = maxY - minY;
    if (bw < 20 || bh < 20) return null;
    if (bw > 3 * bh || bh > 3 * bw) return null;

    return [{ x: minX, y: minY }, { x: maxX, y: minY },
            { x: minX, y: maxY }, { x: maxX, y: maxY }];
  }

  function mapPoint(corners, u, v) {
    const [tl, tr, bl, br] = corners;
    return {
      x: tl.x * (1 - u) * (1 - v) + tr.x * u * (1 - v) + bl.x * (1 - u) * v + br.x * u * v,
      y: tl.y * (1 - u) * (1 - v) + tr.y * u * (1 - v) + bl.y * (1 - u) * v + br.y * u * v,
    };
  }

  function sampleGrid(imageData, imgWidth, imgHeight, corners, gridSize, palette) {
    palette = palette || DATA_COLORS_8;
    const grid = createEmptyGrid(gridSize);
    const pixels = imageData.data;

    // Sample border color for white-balance reference
    let refR = 0, refG = 0, refB = 0, refN = 0;
    const cMidU = 0.5, cMidV = 0.5;
    for (let s = 0; s < 3; s++) {
      const uu = (gridSize / 2 - 1 + s) / gridSize;
      const vv = (gridSize / 2 - 1 + s) / gridSize;
      const pt = mapPoint(corners, uu, vv);
      const c = samplePatch(pixels, imgWidth, imgHeight, pt.x, pt.y, 0);
      refR += c.r; refG += c.g; refB += c.b; refN++;
    }
    const avgRefR = refN > 0 ? refR / refN : 128;
    const avgRefG = refN > 0 ? refG / refN : 128;
    const avgRefB = refN > 0 ? refB / refN : 128;
    const refBright = (avgRefR + avgRefG + avgRefB) / 3 || 1;

    for (let r = 0; r < gridSize; r++) {
      for (let c = 0; c < gridSize; c++) {
        const u = (c + 0.5) / gridSize, v = (r + 0.5) / gridSize;
        const pt = mapPoint(corners, u, v);
        const patch = samplePatch(pixels, imgWidth, imgHeight, pt.x, pt.y, 1);

        const isBorder = r < BORDER_CELLS || r >= gridSize - BORDER_CELLS ||
                         c < BORDER_CELLS || c >= gridSize - BORDER_CELLS;
        if (isBorder) {
          grid[r][c] = ((patch.r - 255) ** 2 + (patch.g - 255) ** 2 + (patch.b - 255) ** 2) < 20000 ? -2 : -1;
        } else {
          grid[r][c] = classifyCellColorRatio(patch.r, patch.g, patch.b, palette);
        }
      }
    }
    return grid;
  }

  function decodeGrid(grid, gridSize, bitsPerCell) {
    const colorCount = 1 << bitsPerCell;
    const bits = [];
    for (let r = 0; r < gridSize; r++) {
      for (let c = 0; c < gridSize; c++) {
        const isBorder = r < BORDER_CELLS || r >= gridSize - BORDER_CELLS ||
                         c < BORDER_CELLS || c >= gridSize - BORDER_CELLS;
        if (isBorder) continue;
        const ci = grid[r][c];
        if (ci < 0 || ci >= colorCount) {
          for (let b = 0; b < bitsPerCell; b++) bits.push(0);
        } else {
          for (let b = bitsPerCell - 1; b >= 0; b--) bits.push((ci >> b) & 1);
        }
      }
    }
    const fb = bitsToBytes(bits);
    if (fb.length < 10 || fb[0] !== MAGIC) return null;
    const frameIdx = fb[2], totalFrames = fb[3];
    const payloadLen = (fb[4] << 8) | fb[5];
    const flags = fb[6], hasFilename = !!(flags & 1);
    const colorDepth = (flags & 2) ? 8 : 4;
    if (8 + payloadLen + 2 > fb.length) return null;
    const crcData = fb.subarray(0, 8 + payloadLen);
    const expCrc = (fb[8 + payloadLen] << 8) | fb[8 + payloadLen + 1];
    if (crc16(crcData) !== expCrc) return null;
    const payload = fb.subarray(8, 8 + payloadLen);
    return { frameIdx, totalFrames, hasFilename, payload, version: fb[1], colorDepth, gridSize: fb[7] || DEFAULT_GRID };
  }

  function autoDetectFrame(imageData, imgWidth, imgHeight, corners) {
    for (const gs of TRIAL_GRIDS) {
      for (const cc of TRIAL_COLORS) {
        const pal = paletteFor(cc);
        const bpc = bitsPerCellFor(cc);
        const grid = sampleGrid(imageData, imgWidth, imgHeight, corners, gs, pal);
        const frame = decodeGrid(grid, gs, bpc);
        if (frame) return frame;
      }
    }
    return null;
  }

  return {
    MAGIC, VERSION, MARKER_COLOR, DATA_COLORS_4, DATA_COLORS_8, CORNER_MARKER,
    BORDER_CELLS, DEFAULT_GRID, TRIAL_GRIDS,
    bytesPerFrame, crc16, encodeFile, renderGrid, paletteFor, bitsPerCellFor,
    findGridCorners, sampleGrid, decodeGrid, autoDetectFrame,
    getCellColor, samplePatch,
  };
})();

</script>
<script>
/**
 * encode.js — File → animate color barcode on screen
 */
const EncodeUI = (() => {
  'use strict';

  let grids = [], totalFrames = 0, currentFrame = 0;
  let animId = null, playing = false;
  let gridSize = Cimbar.DEFAULT_GRID;
  let colorCount = 4, palette = Cimbar.DATA_COLORS_4;
  let frameMs = 300, repeatCount = 2;
  let canvas, ctx, canvasSize = 600;

  function init(canvasEl, size) {
    canvas = canvasEl;
    ctx = canvas.getContext('2d');
    canvasSize = size || 600;
    canvas.width = canvasSize;
    canvas.height = canvasSize;
  }

  async function loadFile(file) {
    stop();
    const buffer = await file.arrayBuffer();
    const bytes = new Uint8Array(buffer);
    const result = Cimbar.encodeFile(bytes, file.name, gridSize, colorCount);
    grids = result.grids;
    totalFrames = result.totalFrames;
    currentFrame = 0;
    palette = result.palette;
    return result;
  }

  function renderFrame(idx) {
    if (!grids.length) return;
    const i = idx % totalFrames;
    Cimbar.renderGrid(ctx, grids[i], canvasSize, palette);
  }

  function tick() {
    if (!playing || !grids.length) return;
    renderFrame(currentFrame);
    currentFrame = (currentFrame + 1) % totalFrames;
    animId = setTimeout(tick, frameMs);
  }

  function play() { if (!playing && grids.length) { playing = true; tick(); } }
  function pause() { playing = false; if (animId) { clearTimeout(animId); animId = null; } }
  function stop() {
    pause();
    grids = []; totalFrames = 0; currentFrame = 0;
    if (ctx && canvas) ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function setGridSize(sz) { gridSize = sz; }
  function setColorCount(cc) {
    colorCount = cc;
    palette = Cimbar.paletteFor(cc);
  }
  function setSpeed(ms) { frameMs = ms; }
  function setRepeat(n) { repeatCount = n; }

  function getState() {
    return {
      playing, totalFrames, currentFrame,
      gridSize, colorCount, frameMs, repeatCount,
      bytesPerFrame: Cimbar.bytesPerFrame(gridSize, Cimbar.bitsPerCellFor(colorCount)),
    };
  }

  return { init, loadFile, play, pause, stop, renderFrame,
           setGridSize, setColorCount, setSpeed, setRepeat, getState };
})();

</script>
<script>
/**
 * decode.js — Camera scanner + file reconstruction for cimbar color barcodes
 */
const DecodeUI = (() => {
  'use strict';

  let videoEl, previewCanvas, previewCtx;
  let scanCanvas, scanCtx;
  let stream = null, scanning = false, scanTimer = null;
  let frameData = {}, receivedFrames = new Set(), totalFrames = null;
  let fileName = null, lastFrameIdx = -1, finished = false, framesOk = 0;
  let lastCorners = null, debugCount = 0;
  // Saved detect params from first successful frame
  let detectedGridSize = null, detectedBitsPerCell = null;

  function init(videoElement, previewCanvasEl, scanWidth, scanHeight) {
    videoEl = videoElement;
    previewCanvas = previewCanvasEl;
    previewCtx = previewCanvas.getContext('2d');
    scanCanvas = document.createElement('canvas');
    scanCanvas.width = scanWidth || 800;
    scanCanvas.height = scanHeight || 600;
    scanCtx = scanCanvas.getContext('2d');
  }

  async function startCamera(facingMode) {
    stopCamera();
    const constraints = {
      video: { facingMode: facingMode || 'environment', width: {ideal:1280}, height: {ideal:720} },
      audio: false,
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    videoEl.srcObject = stream;
    await videoEl.play();
  }

  function stopCamera() {
    scanning = false;
    if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    if (videoEl) videoEl.srcObject = null;
    resetAccumulator();
  }

  function resetAccumulator() {
    frameData = {}; receivedFrames = new Set(); totalFrames = null;
    fileName = null; lastFrameIdx = -1; finished = false; framesOk = 0;
    lastCorners = null; debugCount = 0;
    detectedGridSize = null; detectedBitsPerCell = null;
  }

  function drawPreview() {
    if (!videoEl || !previewCtx || videoEl.readyState < 2) return;
    const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
    const pw = previewCanvas.width, ph = previewCanvas.height;
    const scale = Math.min(pw / vw, ph / vh);
    const dx = (pw - vw * scale) / 2, dy = (ph - vh * scale) / 2;
    previewCtx.clearRect(0, 0, pw, ph);
    previewCtx.drawImage(videoEl, dx, dy, vw * scale, vh * scale);
  }

  function processFrame() {
    if (!scanning || !videoEl || videoEl.readyState < 2) return null;

    drawPreview();
    const sw = scanCanvas.width, sh = scanCanvas.height;
    scanCtx.drawImage(videoEl, 0, 0, sw, sh);
    const imageData = scanCtx.getImageData(0, 0, sw, sh);

    const corners = Cimbar.findGridCorners(imageData, sw, sh);
    if (corners) lastCorners = corners;
    drawOverlay(lastCorners);

    if (!corners) { debugCount++; return null; }

    let frame;

    if (detectedGridSize !== null) {
      // Use known params for speed
      const pal = Cimbar.paletteFor(detectedBitsPerCell === 3 ? 8 : 4);
      const grid = Cimbar.sampleGrid(imageData, sw, sh, corners, detectedGridSize, pal);
      frame = Cimbar.decodeGrid(grid, detectedGridSize, detectedBitsPerCell);
    } else {
      // Auto-detect: try all combos
      frame = Cimbar.autoDetectFrame(imageData, sw, sh, corners);
      if (frame) {
        detectedGridSize = frame.gridSize;
        detectedBitsPerCell = (frame.colorDepth === 8) ? 3 : 2;
      }
    }

    if (!frame) {
      debugCount++;
      drawDebugText('No valid frame (tried 5 grids × 2 colors) #' + debugCount);
      return null;
    }

    debugCount = 0;
    framesOk++;
    drawDebugText('OK frame ' + frame.frameIdx + '/' + frame.totalFrames +
                  ' [' + detectedGridSize + 'x' + detectedGridSize + ' ' +
                  (detectedBitsPerCell === 3 ? 8 : 4) + 'c]');

    if (frame.frameIdx === lastFrameIdx) {
      return { frameIdx: frame.frameIdx, totalFrames: totalFrames || frame.totalFrames, received: receivedFrames.size };
    }
    lastFrameIdx = frame.frameIdx;

    if (totalFrames === null) totalFrames = frame.totalFrames;

    if (!receivedFrames.has(frame.frameIdx)) {
      receivedFrames.add(frame.frameIdx);
      frameData[frame.frameIdx] = frame;
      if (frame.hasFilename && frame.payload && frame.payload.length > 1) {
        const fLen = frame.payload[0];
        if (fLen > 0 && fLen < frame.payload.length)
          fileName = new TextDecoder().decode(frame.payload.subarray(1, 1 + fLen));
      }
    }

    if (receivedFrames.size >= totalFrames) finishScan();
    return { frameIdx: frame.frameIdx, totalFrames, received: receivedFrames.size };
  }

  function drawOverlay(corners) {
    if (!previewCtx) return;
    const pw = previewCanvas.width, ph = previewCanvas.height;
    const sw = scanCanvas.width, sh = scanCanvas.height;
    const sx = pw / sw, sy = ph / sh;

    if (corners) {
      previewCtx.strokeStyle = '#00ff88'; previewCtx.lineWidth = 3;
      previewCtx.beginPath();
      previewCtx.moveTo(corners[0].x*sx, corners[0].y*sy);
      previewCtx.lineTo(corners[1].x*sx, corners[1].y*sy);
      previewCtx.lineTo(corners[3].x*sx, corners[3].y*sy);
      previewCtx.lineTo(corners[2].x*sx, corners[2].y*sy);
      previewCtx.closePath(); previewCtx.stroke();

      previewCtx.fillStyle = '#ff0';
      for (const c of corners) {
        previewCtx.beginPath();
        previewCtx.arc(c.x*sx, c.y*sy, 5, 0, Math.PI*2);
        previewCtx.fill();
      }
    }
  }

  function drawDebugText(msg) {
    if (!previewCtx) return;
    previewCtx.fillStyle = 'rgba(0,0,0,0.65)';
    previewCtx.fillRect(6, 6, 320, 26);
    previewCtx.fillStyle = '#0f0';
    previewCtx.font = '15px monospace';
    previewCtx.fillText(msg, 14, 25);
  }

  function startScan() {
    if (!stream) return;
    scanning = true; resetAccumulator();
    scanTimer = setInterval(processFrame, 150);
  }

  function pauseScan() {
    scanning = false;
    if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
  }

  function finishScan() {
    if (finished) return;
    finished = true;
    pauseScan();

    const payloads = [];
    for (let i = 0; i < totalFrames; i++) {
      const f = frameData[i];
      if (!f) { drawDebugText('MISSING frame ' + i + ' — keep scanning'); finished = false; startScan(); return; }
      if (f.hasFilename) {
        const fLen = f.payload[0];
        payloads.push(f.payload.subarray(1 + fLen));
      } else {
        payloads.push(f.payload);
      }
    }

    let totalLen = 0;
    for (const p of payloads) totalLen += p.length;
    const result = new Uint8Array(totalLen);
    let offset = 0;
    for (const p of payloads) { result.set(p, offset); offset += p.length; }

    const blob = new Blob([result]);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName || 'received_file';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    drawDebugText('DOWNLOADED: ' + (fileName || 'file') + ' (' + result.length + 'B)');
    return { fileName, size: result.length };
  }

  function getState() {
    return {
      scanning, totalFrames, receivedCount: receivedFrames.size,
      receivedSet: receivedFrames, fileName, framesOk,
      detectedGridSize, detectedBitsPerCell,
    };
  }

  return { init, startCamera, stopCamera, startScan, pauseScan, processFrame,
           resetAccumulator, finishScan, getState };
})();

</script>
<script>
/**
 * app.js — Main application: tab switching, UI wiring, initialization
 */
(function () {
  'use strict';

  const BARCODE_SIZE = 600;
  const $ = (sel) => document.querySelector(sel);

  const tabEncode = $('#tab-encode'), tabDecode = $('#tab-decode');
  const panelEncode = $('#panel-encode'), panelDecode = $('#panel-decode');
  const fileInput = $('#file-input'), dropZone = $('#drop-zone');
  const encodeCanvas = $('#encode-canvas');
  const btnPlay = $('#btn-play'), btnPause = $('#btn-pause'), btnStop = $('#btn-stop');
  const encodeStatus = $('#encode-status'), encodeProgress = $('#encode-progress');
  const speedSlider = $('#speed-slider'), speedLabel = $('#speed-label');
  const gridSelect = $('#grid-select'), colorSelect = $('#color-select');
  const decodeVideo = $('#decode-video'), decodePreview = $('#decode-preview');
  const btnStartCam = $('#btn-start-cam'), btnStopCam = $('#btn-stop-cam');
  const btnScan = $('#btn-scan'), btnPauseScan = $('#btn-pause-scan');
  const decodeStatus = $('#decode-status'), decodeProgress = $('#decode-progress');
  const cameraSelect = $('#camera-select');
  const frameProgressBar = $('#frame-progress');

  let encodeInterval = null, decodeInterval = null;

  function clearEncodeInterval() {
    if (encodeInterval) { clearInterval(encodeInterval); encodeInterval = null; }
  }
  function clearDecodeInterval() {
    if (decodeInterval) { clearInterval(decodeInterval); decodeInterval = null; }
  }

  EncodeUI.init(encodeCanvas, BARCODE_SIZE);
  DecodeUI.init(decodeVideo, decodePreview, 800, 600);

  function switchTab(tab) {
    clearEncodeInterval(); clearDecodeInterval();
    if (tab === 'encode') {
      tabEncode.classList.add('active'); tabDecode.classList.remove('active');
      panelEncode.classList.add('active'); panelDecode.classList.remove('active');
      DecodeUI.stopCamera(); EncodeUI.pause();
    } else {
      tabDecode.classList.add('active'); tabEncode.classList.remove('active');
      panelDecode.classList.add('active'); panelEncode.classList.remove('active');
    }
    document.body.dataset.tab = tab;
  }
  tabEncode.addEventListener('click', () => switchTab('encode'));
  tabDecode.addEventListener('click', () => switchTab('decode'));

  // --- Encode ---
  function updateEncodeStatus() {
    const s = EncodeUI.getState();
    encodeProgress.textContent = s.totalFrames
      ? 'Frame ' + (s.currentFrame+1) + ' / ' + s.totalFrames + '  |  ' + s.bytesPerFrame + ' B/frame' : '';
    encodeStatus.textContent = s.totalFrames
      ? (s.playing ? 'Animating…' : 'Paused') : 'Select a file to begin';
  }

  async function handleFile(file) {
    clearEncodeInterval();
    try {
      encodeStatus.textContent = 'Encoding…';
      const result = await EncodeUI.loadFile(file);
      const s = EncodeUI.getState();
      encodeStatus.textContent = 'Ready — ' + result.totalFrames + ' frames, ' +
        s.bytesPerFrame + ' B/frame, ' + result.colorCount + ' colors';
      EncodeUI.renderFrame(0); updateEncodeStatus();
    } catch (e) { encodeStatus.textContent = 'Error: ' + e.message; }
  }

  fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  dropZone.addEventListener('click', () => fileInput.click());

  btnPlay.addEventListener('click', () => {
    EncodeUI.play(); updateEncodeStatus();
    clearEncodeInterval();
    encodeInterval = setInterval(updateEncodeStatus, 400);
  });
  btnPause.addEventListener('click', () => { EncodeUI.pause(); clearEncodeInterval(); updateEncodeStatus(); });
  btnStop.addEventListener('click', () => { EncodeUI.stop(); clearEncodeInterval(); updateEncodeStatus(); });

  speedSlider.addEventListener('input', () => {
    const ms = parseInt(speedSlider.value);
    EncodeUI.setSpeed(ms); speedLabel.textContent = ms + 'ms';
  });
  EncodeUI.setSpeed(parseInt(speedSlider.value));

  gridSelect.addEventListener('change', () => {
    const sz = parseInt(gridSelect.value);
    EncodeUI.setGridSize(sz);
    encodeStatus.textContent = 'Grid changed — reselect file to re-encode';
  });
  colorSelect.addEventListener('change', () => {
    const cc = parseInt(colorSelect.value);
    EncodeUI.setColorCount(cc);
    encodeStatus.textContent = 'Colors changed — reselect file to re-encode';
  });

  // --- Decode ---
  function renderFrameProgress() {
    const s = DecodeUI.getState();
    if (!s.totalFrames) {
      frameProgressBar.style.display = 'flex';
      frameProgressBar.innerHTML = '<span style="color:var(--text-muted);font-size:0.85rem;padding:4px 8px">等待识别条码…</span>';
      return;
    }
    frameProgressBar.style.display = 'flex';

    let html = '<span style="color:var(--text-muted);font-size:0.75rem;padding:2px 6px;margin-right:4px">' + s.receivedCount + '/' + s.totalFrames + '</span>';
    for (let i = 0; i < s.totalFrames; i++) {
      const rcvd = s.receivedSet.has(i);
      html += '<span class="fc ' + (rcvd ? 'rcvd' : 'pend') + '" title="Frame ' + (i+1) + (rcvd ? ' ✓' : ' ...') + '"></span>';
    }
    frameProgressBar.innerHTML = html;
  }

  function updateDecodeStatus() {
    const s = DecodeUI.getState();
    renderFrameProgress();
    if (s.totalFrames) {
      decodeProgress.textContent = s.receivedCount + ' / ' + s.totalFrames + ' frames';
      if (s.detectedGridSize) {
        decodeProgress.textContent += '  [' + s.detectedGridSize + '×' + s.detectedGridSize +
          ' ' + (s.detectedBitsPerCell === 3 ? 8 : 4) + '色]';
      }
    }
    if (s.totalFrames && s.receivedCount >= s.totalFrames) {
      decodeStatus.textContent = '✅ File received: ' + (s.fileName || 'unknown');
      clearDecodeInterval();
      return;
    }
    decodeStatus.textContent = s.scanning ? 'Scanning… (' + s.receivedCount + '/' + (s.totalFrames||'?') + ')' :
      (s.totalFrames ? 'Paused — ' + s.receivedCount + '/' + s.totalFrames : 'Ready');
  }

  btnStartCam.addEventListener('click', async () => {
    try {
      decodeStatus.textContent = 'Starting camera…';
      await DecodeUI.startCamera(cameraSelect.value);
      decodeStatus.textContent = 'Camera ready — point at barcode';
    } catch (e) { decodeStatus.textContent = 'Camera error: ' + e.message; }
  });
  btnStopCam.addEventListener('click', () => {
    DecodeUI.stopCamera(); clearDecodeInterval();
    decodeStatus.textContent = 'Camera stopped'; decodeProgress.textContent = '';
    frameProgressBar.style.display = 'none';
  });
  btnScan.addEventListener('click', () => {
    DecodeUI.startScan(); updateDecodeStatus();
    clearDecodeInterval();
    decodeInterval = setInterval(updateDecodeStatus, 250);
  });
  btnPauseScan.addEventListener('click', () => {
    DecodeUI.pauseScan(); clearDecodeInterval(); updateDecodeStatus();
  });

  switchTab('encode');
})();

</script>
